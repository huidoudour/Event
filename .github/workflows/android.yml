name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

env:
  SIGN_KEYSTORE_PATH: ${{ github.workspace }}/sign_key

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      if: ${{ env.SIGN_KEY_STORE_B64 != null }}
      run: |
        echo "$SIGN_KEY_STORE_B64" | base64 -d > ${{ env.SIGN_KEYSTORE_PATH }}
      env:
        SIGN_KEY_STORE_B64: ${{ secrets.SIGN_KEY_STORE_B64 }}

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Run Tests
      run: ./gradlew test

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "$SIGN_KEY_STORE_B64" | base64 -d > ${{ env.SIGN_KEYSTORE_PATH }}
      env:
        SIGN_KEY_STORE_B64: ${{ secrets.SIGN_KEY_STORE_B64 }}

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build Signed Release APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=${{ env.SIGN_KEYSTORE_PATH }} \
          -Pandroid.injected.signing.store.password="${{ secrets.SIGN_KEY_STORE_PASSWD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.SIGN_KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.SIGN_KEY_ALIAS_PASSWD }}" \
          --stacktrace

    - name: Upload Signed APK as Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        files: app/build/outputs/apk/release/app-release.apk
        name: Release ${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
