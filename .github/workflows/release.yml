name: Release Pre-release

on:
  push:
    tags:
      - 'v*'

env:
  SIGN_KEYSTORE_PATH: ${{ github.workspace }}/sign_key

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "$SIGN_KEY_STORE_B64" | base64 -d > ${{ env.SIGN_KEYSTORE_PATH }}
      env:
        SIGN_KEY_STORE_B64: ${{ secrets.SIGN_KEY_STORE_B64 }}

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build Signed Release APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file="${{ env.SIGN_KEYSTORE_PATH }}" \
          -Pandroid.injected.signing.store.password="${{ secrets.SIGN_KEY_STORE_PASSWD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.SIGN_KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.SIGN_KEY_ALIAS_PASSWD }}"

    - name: Rename APK with version
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-${{ steps.get_version.outputs.VERSION }}.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-signed-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create Pre-release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        files: app/build/outputs/apk/release/app-release-${{ steps.get_version.outputs.VERSION }}.apk
        name: Release ${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup Keystore
      if: always()
      run: rm -f ${{ env.SIGN_KEYSTORE_PATH }}
