<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：圆形 (#D8F5C5) -->
  
  <!-- 背景层 - 圆形 -->
  <circle cx="60" cy="60" r="60" fill="#D8F5C5"/>
  
  <!-- 前景层：摩尔斯电码图案 - 彩色版本 (左偏 + 放大) -->
  <g transform="translate(-4, 0) scale(1.35) translate(-15, -8)">
    <!-- 第一排：点 划 划 -->
    <!-- 点 - 红色 -->
    <circle cx="44" cy="42" r="5" fill="#FF5252"/>
    <!-- 划 - 绿色 -->
    <rect x="52" y="40.5" width="16" height="3" fill="#4CAF50"/>
    <!-- 划 - 蓝色 -->
    <rect x="74" y="40.5" width="16" height="3" fill="#2196F3"/>
    
    <!-- 第二排：点 划 划 -->
    <!-- 点 - 黄色 -->
    <circle cx="44" cy="56" r="5" fill="#FFC107"/>
    <!-- 划 - 紫色 -->
    <rect x="52" y="54.5" width="16" height="3" fill="#9C27B0"/>
    <!-- 划 - 橙色 -->
    <rect x="74" y="54.5" width="16" height="3" fill="#FF9800"/>
    
    <!-- 第三排：点 划 划 -->
    <!-- 点 - 青色 -->
    <circle cx="44" cy="70" r="5" fill="#00BCD4"/>
    <!-- 划 - 粉色 -->
    <rect x="52" y="68.5" width="16" height="3" fill="#E91E63"/>
    <!-- 划 - 亮绿 -->
    <rect x="74" y="68.5" width="16" height="3" fill="#00E676"/>
  </g>
</svg>
