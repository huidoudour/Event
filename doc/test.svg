<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="60" fill="url(#bgGradient)"/>

  <!-- 事件图标 - 日历样式 -->
  <rect x="35" y="35" width="50" height="50" rx="5" fill="white" opacity="0.9"/>
  <rect x="35" y="35" width="50" height="15" rx="5" fill="#667eea"/>

  <!-- 日历线条 -->
  <line x1="42" y1="58" x2="78" y2="58" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="66" x2="70" y2="66" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="74" x2="65" y2="74" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>

  <!-- 装饰圆点 -->
  <circle cx="45" cy="42" r="2" fill="white"/>
  <circle cx="75" cy="42" r="2" fill="white"/>
</svg>
